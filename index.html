<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── PRIMARY SEO ── -->
    <title>YATIVerse — Start Up Right. Every tool a founder needs, in one place.</title>
    <meta name="description" content="YATIVerse is an AI-native ecosystem for ambitious founders. AI-connected wearables, intelligent agents, and Founder OS — all in one place. Start up right." />

    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://yativerse.com/" />

    <!-- ── OPEN GRAPH ── -->
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://yativerse.com/" />
    <meta property="og:title"        content="YATIVerse — Start Up Right." />
    <meta property="og:description"  content="AI-connected wearables, intelligent agents, and Founder OS — every tool a founder needs, in one place." />

    <!-- ── TWITTER / X ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@yativerse" />
    <meta name="twitter:creator"     content="@yativerse" />
    <meta name="twitter:title"       content="YATIVerse — Start Up Right." />
    <meta name="twitter:description" content="AI-connected wearables, intelligent agents, and Founder OS — every tool a founder needs, in one place." />
    <meta name="twitter:image"       content="https://yativerse.com/og-image.png" />
    <meta name="twitter:image:alt"   content="YATIVerse — Start Up Right" />

    <link rel="icon"             type="image/png" sizes="32x32"   href="/favicon-32.png" />

    <link rel="apple-touch-icon"                  sizes="180x180" href="/apple-touch-icon.png" />

    <meta name="msapplication-TileColor" content="#050814" />
    <meta name="color-scheme"            content="dark" />

    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- ── ORGANIZATION SCHEMA ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "YATIVerse",
      "url": "https://yativerse.com",
      "logo": "https://yativerse.com/logo.png",
      "description": "AI-native ecosystem for ambitious founders. Wearables, AI agents, and Founder OS — all in one place.",
      "foundingDate": "2026",
      "sameAs": [
        "https://x.com/yativerse",
        "https://instagram.com/yativerse",
        "https://linkedin.com/company/yativerse",
        "https://youtube.com/@yativerse"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://yativerse.com/waitlist"
      }
    }
    </script>

    <!-- ── WEBSITE SCHEMA ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "YATIVerse",
      "url": "https://yativerse.com",
      "description": "Start Up Right. Every tool a founder needs, in one place.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://yativerse.com/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ── BREADCRUMB LIST SCHEMA ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home",         "item": "https://yativerse.com/" },
        { "@type": "ListItem", "position": 2, "name": "Signal Ring",  "item": "https://yativerse.com/signal-ring" },
        { "@type": "ListItem", "position": 3, "name": "Early Access", "item": "https://yativerse.com/early-access" },
        { "@type": "ListItem", "position": 4, "name": "Wearables",    "item": "https://yativerse.com/wearables" },
        { "@type": "ListItem", "position": 5, "name": "AI Agents",    "item": "https://yativerse.com/agents" },
        { "@type": "ListItem", "position": 6, "name": "Journey",      "item": "https://yativerse.com/journey" },
        { "@type": "ListItem", "position": 7, "name": "Community",    "item": "https://yativerse.com/community" },
        { "@type": "ListItem", "position": 8, "name": "Waitlist",     "item": "https://yativerse.com/waitlist" }
      ]
    }
    </script>

    <!-- ── FAQ SCHEMA (homepage) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        { "@type": "Question", "name": "Is YATIVerse available right now?",   "acceptedAnswer": { "@type": "Answer", "text": "We're in early access. Joining the waitlist puts you first in line when we open doors." } },
        { "@type": "Question", "name": "What does YATIVerse cost?",           "acceptedAnswer": { "@type": "Answer", "text": "Waitlist members get exclusive early pricing. The Pioneer tier starts at $49 deposit for the Signal Ring." } },
        { "@type": "Question", "name": "Do I need the wearables?",           "acceptedAnswer": { "@type": "Answer", "text": "No. You can start with Yati OS and AI agents. Wearables deepen the experience but aren't required." } },
        { "@type": "Question", "name": "When does the Signal Ring ship?",    "acceptedAnswer": { "@type": "Answer", "text": "We're targeting Q4 2026 for early access members. All deposits are fully refundable." } }
      ]
    }
    </script>

  </head>

    <div id="root"></div>
