    <link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32" />

    <!-- ── PERFORMANCE: preconnect to external origins ──
         Must come BEFORE any requests to those origins.
         crossorigin is required for fonts (CORS fetch). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://gktcrehhhixfgwkixamg.supabase.co" />

    <!-- ── LCP PRELOADS ──
         These 3 poster images are the LCP candidates (hero strip cards).
         MUST be here in HTML — JS-injected preloads are discovered too late.
         imagesrcset lets the browser pick 300w on mobile, 600w on desktop.
         fetchpriority="high" tells the browser to fetch these before anything else. -->
    <link rel="preload" as="image"
      href="https://images.unsplash.com/photo-1506784983877-45594efa4cbe?auto=format&fit=crop&w=600&q=82"
      imagesrcset="https://images.unsplash.com/photo-1506784983877-45594efa4cbe?auto=format&fit=crop&w=300&q=82 300w,
                   https://images.unsplash.com/photo-1506784983877-45594efa4cbe?auto=format&fit=crop&w=600&q=82 600w"
      imagesizes="(max-width: 768px) 33vw, 300px"
      fetchpriority="high" />
    <link rel="preload" as="image"
      href="https://images.unsplash.com/photo-1551434678-e076c223a692?auto=format&fit=crop&w=600&q=82"
      imagesrcset="https://images.unsplash.com/photo-1551434678-e076c223a692?auto=format&fit=crop&w=300&q=82 300w,
                   https://images.unsplash.com/photo-1551434678-e076c223a692?auto=format&fit=crop&w=600&q=82 600w"
      imagesizes="(max-width: 768px) 33vw, 300px"
      fetchpriority="high" />
    <link rel="preload" as="image"
      href="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=600&q=82"
      imagesrcset="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=300&q=82 300w,
                   https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=600&q=82 600w"
      imagesizes="(max-width: 768px) 33vw, 300px"
      fetchpriority="high" />

    <!-- ── FONTS ──
         FIX: was render-blocking (saves 1,050ms mobile).
         media="print" trick: browser loads it as non-blocking print stylesheet,
         then onload swaps it to 'all' so it applies after paint.
         The <noscript> fallback handles JS-disabled browsers. -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    </noscript>

        "@type": "Organization",
        "name": "yAtIverse",
        "url": "https://yativerse.ai",
        "logo": "https://yativerse.ai/logo.png",
        "description": "AI-native ecosystem for ambitious founders. Wearables, AI agents, and Founder OS — all in one place.",
        "foundingDate": "2026",
        "sameAs": [
          "https://x.com/yAtIverse",
          "https://instagram.com/yAtIverse",

          "https://youtube.com/@yAtIverse"
        ],

          "url": "https://yativerse.ai/waitlist"
        }
      }
    </script>

    <!-- ── SCHEMA: WebSite ── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "yAtIverse",
        "url": "https://yativerse.ai",
        "description": "Start Up Right. Every tool a founder needs, in one place.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://yativerse.ai/?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- ── SCHEMA: BreadcrumbList ── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home",        "item": "https://yativerse.ai/" },
          { "@type": "ListItem", "position": 2, "name": "Signal Ring", "item": "https://yativerse.ai/signal-ring" },
          { "@type": "ListItem", "position": 3, "name": "Early Access","item": "https://yativerse.ai/early-access" },
          { "@type": "ListItem", "position": 4, "name": "Wearables",   "item": "https://yativerse.ai/wearables" },
          { "@type": "ListItem", "position": 5, "name": "AI Agents",   "item": "https://yativerse.ai/agents" },
          { "@type": "ListItem", "position": 6, "name": "Journey",     "item": "https://yativerse.ai/journey" },
          { "@type": "ListItem", "position": 7, "name": "Community",   "item": "https://yativerse.ai/community" },
          { "@type": "ListItem", "position": 8, "name": "Waitlist",    "item": "https://yativerse.ai/waitlist" }
        ]
      }
    </script>

    <!-- ── SCHEMA: FAQPage ── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is yAtIverse available right now?",
            "acceptedAnswer": { "@type": "Answer", "text": "We're in early access. Joining the waitlist puts you first in line when we open doors." }
          },
          {
            "@type": "Question",
            "name": "What does yAtIverse cost?",
            "acceptedAnswer": { "@type": "Answer", "text": "Waitlist members get exclusive early pricing. The Pioneer tier starts at $49 deposit for the Signal Ring." }
          },
          {
            "@type": "Question",
            "name": "Do I need the wearables?",
            "acceptedAnswer": { "@type": "Answer", "text": "No. You can start with yAtI OS and AI agents. Wearables deepen the experience but aren't required." }
          },
          {
            "@type": "Question",
            "name": "When does the Signal Ring ship?",
            "acceptedAnswer": { "@type": "Answer", "text": "We're targeting Q4 2026 for early access members. All deposits are fully refundable." }
          }
        ]
      }
    </script>
