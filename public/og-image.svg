<svg viewBox="0 0 1200 630" width="1200" height="630" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="yAtIverse — Start Up Right. Build what matters.">
  <title>yAtIverse — Start Up Right. Build what matters.</title>
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="46%" r="56%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#605CFF" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="#605CFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#605CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-glow2" cx="78%" cy="78%" r="32%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#C86DD7" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#C86DD7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.42)"/>
    </radialGradient>

    <!-- Glow filter for the custom "I" shape -->
    <filter id="i-bloom" x="-250%" y="-180%" width="600%" height="460%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1200" height="630" fill="#050814"/>
  <rect width="1200" height="630" fill="url(#bg-glow)"/>
  <rect width="1200" height="630" fill="url(#bg-glow2)"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>
  <rect x="1.5" y="1.5" width="1197" height="627" fill="none"
        stroke="rgba(255,255,255,0.055)" stroke-width="1"/>

  <!-- Brand accent dots -->
  <circle cx="52"   cy="52"  r="2.5" fill="#605CFF" opacity="0.50"/>
  <circle cx="1148" cy="578" r="2.5" fill="#605CFF" opacity="0.28"/>

  <!-- ══ WORDMARK ══════════════════════════════════════════
       Positions (DejaVu Sans, kern=-4, sz=140, baseline=355):
         "y"     x=258  (wt 300, white)
         "At"    x=337  (wt 700, white)
         "I"     custom serif I at center=534  (purple)
         "verse" x=556  (wt 300, white/28)
  ═══════════════════════════════════════════════════════ -->

  <!-- "I" glow bloom — renders behind everything -->
  <g filter="url(#i-bloom)" opacity="0.85">
    <!-- top crossbar -->
    <rect x="512" y="260" width="44" height="10" rx="2" fill="#605CFF"/>
    <!-- stem -->
    <rect x="525" y="270" width="18" height="75" fill="#605CFF"/>
    <!-- bottom crossbar -->
    <rect x="512" y="345" width="44" height="10" rx="2" fill="#605CFF"/>
  </g>

  <!-- "y" — light, near-white -->
  <text x="258" y="355"
        font-family="'DejaVu Sans', ui-sans-serif, sans-serif"
        font-size="140" font-weight="300"
        fill="rgba(255,255,255,0.88)">y</text>

  <!-- "At" — bold, white -->
  <text x="337" y="355"
        font-family="'DejaVu Sans', ui-sans-serif, sans-serif"
        font-size="140" font-weight="700"
        fill="rgba(255,255,255,0.97)">At</text>

  <!-- Custom "I" letterform — crisp purple, on top of glow -->
  <!-- top crossbar -->
  <rect x="512" y="260" width="44" height="10" rx="2" fill="#6C68FF"/>
  <!-- stem -->
  <rect x="525" y="270" width="18" height="75" fill="#6C68FF"/>
  <!-- bottom crossbar -->
  <rect x="512" y="345" width="44" height="10" rx="2" fill="#6C68FF"/>

  <!-- "verse" — very muted, recedes -->
  <text x="552" y="355"
        font-family="'DejaVu Sans', ui-sans-serif, sans-serif"
        font-size="140" font-weight="300"
        fill="rgba(255,255,255,0.28)">verse</text>

  <!-- ══ TAGLINE ══════════════════════════════════════════ -->
  <text x="600" y="418"
        font-family="'DejaVu Sans', ui-sans-serif, sans-serif"
        font-size="20" font-weight="400" letter-spacing="0.5"
        fill="rgba(255,255,255,0.38)"
        text-anchor="middle">Start Up Right. Build what matters.</text>

  <!-- ══ BOTTOM STRIP ═════════════════════════════════════ -->
  <line x1="526" y1="533" x2="674" y2="533"
        stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <text x="600" y="562"
        font-family="'DejaVu Sans', ui-sans-serif, sans-serif"
        font-size="11.5" font-weight="700" letter-spacing="3"
        fill="rgba(255,255,255,0.19)"
        text-anchor="middle">WEARABLES · AI AGENTS · FOUNDER OS</text>

  <text x="1148" y="562"
        font-family="'DejaVu Sans', ui-sans-serif, sans-serif"
        font-size="12" font-weight="400"
        fill="rgba(255,255,255,0.17)"
        text-anchor="end">yativerse.com</text>

  <text x="52" y="562"
        font-family="'DejaVu Sans', ui-sans-serif, sans-serif"
        font-size="12" font-weight="400"
        fill="rgba(255,255,255,0.17)"
        text-anchor="start">Early access open</text>
</svg>
